name: quote-budget gpt-4o-mini (full 350)

# Sweeps quote budgets {0, 1, 2, 4} on free_choice for ALL 350 questions
# in the dataset (not just the 50 obfuscator candidates). Chained jobs:
# one budget per job so each one starts with a fresh TPM window. Final
# `summarize` job aggregates over every budget present in the cache.
#
# 350 questions × 4 budgets × 8 samples = 11,200 gpt-4o-mini calls,
# roughly $0.50-1 total. Wall-clock ~10-20 min per budget job.
#
# Required repo secret: OPENAI_API_KEY (or PERSONAL_OPEN_AI_KEY).

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: "Which repo secret to use as OPENAI_API_KEY"
        type: choice
        required: true
        default: "OPENAI_API_KEY"
        options:
          - OPENAI_API_KEY
          - PERSONAL_OPEN_AI_KEY

permissions:
  contents: read

env:
  OUTPUT_DIR: exp/quote_budget_4omini_full
  CACHE_KEY_PREFIX: quote-budget-4omini-full

jobs:
  q0:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-obfuscation.txt
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-q0
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-
            ${{ env.CACHE_KEY_PREFIX }}-
      - name: Run q=0
        env:
          OPENAI_API_KEY: ${{ inputs.api_key == 'PERSONAL_OPEN_AI_KEY' && secrets.PERSONAL_OPEN_AI_KEY || secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m scripts.quote_budget_4omini \
            --candidate-set all \
            --quote-budgets 0 \
            --output-dir "$OUTPUT_DIR"
      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-q0

  q1:
    needs: q0
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-obfuscation.txt
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-q1
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-
            ${{ env.CACHE_KEY_PREFIX }}-
      - name: Run q=1
        env:
          OPENAI_API_KEY: ${{ inputs.api_key == 'PERSONAL_OPEN_AI_KEY' && secrets.PERSONAL_OPEN_AI_KEY || secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m scripts.quote_budget_4omini \
            --candidate-set all \
            --quote-budgets 1 \
            --output-dir "$OUTPUT_DIR"
      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-q1

  q2:
    needs: q1
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-obfuscation.txt
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-q2
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-
            ${{ env.CACHE_KEY_PREFIX }}-
      - name: Run q=2
        env:
          OPENAI_API_KEY: ${{ inputs.api_key == 'PERSONAL_OPEN_AI_KEY' && secrets.PERSONAL_OPEN_AI_KEY || secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m scripts.quote_budget_4omini \
            --candidate-set all \
            --quote-budgets 2 \
            --output-dir "$OUTPUT_DIR"
      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-q2

  q4:
    needs: q2
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-obfuscation.txt
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-q4
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-
            ${{ env.CACHE_KEY_PREFIX }}-
      - name: Run q=4
        env:
          OPENAI_API_KEY: ${{ inputs.api_key == 'PERSONAL_OPEN_AI_KEY' && secrets.PERSONAL_OPEN_AI_KEY || secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m scripts.quote_budget_4omini \
            --candidate-set all \
            --quote-budgets 4 \
            --output-dir "$OUTPUT_DIR"
      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-q4

  summarize:
    needs: q4
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-obfuscation.txt
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-summarize
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}-
            ${{ env.CACHE_KEY_PREFIX }}-
      - name: Aggregate (no API calls)
        run: |
          python -m scripts.quote_budget_4omini \
            --candidate-set all \
            --output-dir "$OUTPUT_DIR" \
            --summarize-only
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: quote-budget-full-results
          path: |
            ${{ env.OUTPUT_DIR }}/results.json
            ${{ env.OUTPUT_DIR }}/cache/
          retention-days: 30
