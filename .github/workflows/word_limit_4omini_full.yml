name: word-limit gpt-4o-mini (full 350)

# Sweeps the consultant's argument word limit on free_choice for ALL
# 350 questions in the dataset (not just the 50 obfuscator candidates).
# Word limits and which subsets to run are selectable via the
# word_limits dropdown. Quote system unchanged.
#
# Required repo secret: OPENAI_API_KEY (or PERSONAL_OPEN_AI_KEY).

on:
  workflow_dispatch:
    inputs:
      word_limits:
        description: "Word limits to run (comma-separated). Already-cached limits are skipped; summarize covers all cached limits."
        type: choice
        required: true
        default: "50,200,800"
        options:
          - "50"
          - "100"
          - "200"
          - "400"
          - "800"
          - "50,200,800"
          - "100,400"
          - "50,100,200,400,800"
      api_key:
        description: "Which repo secret to use as OPENAI_API_KEY"
        type: choice
        required: true
        default: "OPENAI_API_KEY"
        options:
          - OPENAI_API_KEY
          - PERSONAL_OPEN_AI_KEY

permissions:
  contents: read

env:
  OUTPUT_DIR: exp/word_limit_4omini_full
  CACHE_KEY_PREFIX: word-limit-4omini-full

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-obfuscation.txt

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-

      - name: Run sweep
        env:
          OPENAI_API_KEY: ${{ inputs.api_key == 'PERSONAL_OPEN_AI_KEY' && secrets.PERSONAL_OPEN_AI_KEY || secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m scripts.word_limit_4omini \
            --candidate-set all \
            --word-limits "${{ inputs.word_limits }}" \
            --output-dir "$OUTPUT_DIR"

      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: word-limit-full-results
          path: |
            ${{ env.OUTPUT_DIR }}/results.json
            ${{ env.OUTPUT_DIR }}/cache/
          retention-days: 30
