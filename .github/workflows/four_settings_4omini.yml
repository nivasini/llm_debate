name: four-settings gpt-4o-mini (350)

# Compares 4 consultant-motivation settings on gpt-4o-mini against
# the existing no-context CoT judge over all 350 questions:
#   1. Aligned     — 2-call: choice model + neutral explanation model
#   2. Correctness — single call, correctness paramount
#   3. Both-goals  — single call, identify correct + helpful explanation
#   4. Strategic   — single call, pick whichever is easiest to convince
#
# Records fc_inc, judge_agree, judge_correct per setting × question.
#
# Required repo secret: OPENAI_API_KEY (or PERSONAL_OPEN_AI_KEY).

on:
  workflow_dispatch:
    inputs:
      settings:
        description: "Settings to run (comma-separated). Default: all 4."
        type: choice
        required: true
        default: "1_aligned,2_correctness,3_both,4_strategic"
        options:
          - "1_aligned"
          - "2_correctness"
          - "3_both"
          - "4_strategic"
          - "1_aligned,2_correctness,3_both,4_strategic"
          - "2_correctness,3_both,4_strategic"
      api_key:
        description: "Which repo secret to use as OPENAI_API_KEY"
        type: choice
        required: true
        default: "OPENAI_API_KEY"
        options:
          - OPENAI_API_KEY
          - PERSONAL_OPEN_AI_KEY

permissions:
  contents: read

env:
  OUTPUT_DIR: exp/four_settings
  CACHE_KEY_PREFIX: four-settings-4omini

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-obfuscation.txt

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-

      - name: Run experiment
        env:
          OPENAI_API_KEY: ${{ inputs.api_key == 'PERSONAL_OPEN_AI_KEY' && secrets.PERSONAL_OPEN_AI_KEY || secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m scripts.four_settings_4omini \
            --settings "${{ inputs.settings }}"

      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: four-settings-results
          path: |
            ${{ env.OUTPUT_DIR }}/results.json
            ${{ env.OUTPUT_DIR }}/cache/
          retention-days: 30
