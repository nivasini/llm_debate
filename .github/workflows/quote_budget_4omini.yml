name: quote-budget gpt-4o-mini

# Sweeps the consultant's quote budget on free_choice for the 50 strict
# gpt-4o-mini obfuscator candidates and measures how fc_inc shifts.
# Quote budgets configured in scripts/quote_budget_4omini.py
# (currently {1, 8}). gpt-4o-mini, n=8 per (question, budget).
#
# Required repo secret: OPENAI_API_KEY (or PERSONAL_OPEN_AI_KEY).

on:
  workflow_dispatch:
    inputs:
      quote_budgets:
        description: "Quote budgets to run (comma-separated; e.g. '0,2,4'). Already-cached budgets are skipped; summarize covers all cached budgets."
        type: choice
        required: true
        default: "0,2,4"
        options:
          - "0"
          - "1"
          - "2"
          - "4"
          - "8"
          - "0,2,4"
          - "0,1,2,4,8"
      api_key:
        description: "Which repo secret to use as OPENAI_API_KEY"
        type: choice
        required: true
        default: "OPENAI_API_KEY"
        options:
          - OPENAI_API_KEY
          - PERSONAL_OPEN_AI_KEY

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-obfuscation.txt

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: exp/quote_budget_4omini/cache
          key: quote-budget-4omini-${{ github.run_id }}
          restore-keys: |
            quote-budget-4omini-

      - name: Run sweep
        env:
          OPENAI_API_KEY: ${{ inputs.api_key == 'PERSONAL_OPEN_AI_KEY' && secrets.PERSONAL_OPEN_AI_KEY || secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m scripts.quote_budget_4omini --quote-budgets "${{ inputs.quote_budgets }}"

      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: exp/quote_budget_4omini/cache
          key: quote-budget-4omini-${{ github.run_id }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quote-budget-results
          path: |
            exp/quote_budget_4omini/results.json
            exp/quote_budget_4omini/cache/
          retention-days: 30
