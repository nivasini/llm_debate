name: obfuscation-gpt54

# Runs scripts/obfuscation_candidates_gpt54.py across 10 obfuscation
# candidate questions, 4 conditions each, on gpt-5.4. Each matrix shard
# handles ONE question × all enabled conditions. The `summarize` job
# collects all shard caches and produces details.json + results.csv.
#
# Required repo secret: OPENAI_API_KEY
#
# Trigger manually from the Actions tab. Optional inputs:
#   conditions — comma-separated subset (default: all 4)
#   concurrency — in-shard per-job concurrency (default: 6)
#
# max-parallel (shards running simultaneously) is hardcoded to 5 in the
# matrix strategy below; change it there if needed.

on:
  workflow_dispatch:
    inputs:
      conditions:
        description: "Comma-separated conditions"
        default: "assigned_correct,assigned_incorrect,free_choice,defendability"
        required: false
      concurrency:
        description: "In-shard API concurrency"
        default: "6"
        required: false

permissions:
  contents: read

jobs:
  shard:
    name: ${{ matrix.question }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        question:
          - v3_78   # Accidental Death
          - v3_42   # Lex
          - v3_63   # Mars Confidential
          - v3_99   # To Each His Star
          - v2_115  # Monkey On His Back
          - v3_19   # The Repairman
          - v3_111  # The Talkative Tree
          - v3_155  # The Haunted Fountain
          - v3_192  # The Blue Tower
          - v2_8    # The Man Who Was Six
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-obfuscation.txt

      - name: Run shard
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m scripts.obfuscation_candidates_gpt54 \
            --only "${{ matrix.question }}" \
            --conditions "${{ inputs.conditions }}" \
            --concurrency "${{ inputs.concurrency }}"

      - name: Upload shard cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-${{ matrix.question }}
          path: exp/obfuscation_gpt54/cache/
          retention-days: 30
          if-no-files-found: warn

  summarize:
    name: summarize
    needs: shard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-obfuscation.txt

      - name: Download all shard caches
        uses: actions/download-artifact@v4
        with:
          path: exp/obfuscation_gpt54/cache/
          pattern: cache-*
          merge-multiple: true

      - name: Summarize
        run: |
          python -m scripts.obfuscation_candidates_gpt54 --summarize-only

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            exp/obfuscation_gpt54/details.json
            exp/obfuscation_gpt54/results.csv
          retention-days: 90
