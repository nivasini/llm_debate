name: strategic isolation gpt-4o-mini (precommit/motivated/tone)

# Three single-element variants of the 4_strategic prompt to isolate
# which structural feature drove the high fc_inc (~60%) of the old
# free_choice consultant vs the new 4_strategic prompt (~24%):
#
#   precommit  : add the old user1 turn that forces an answer
#                commitment BEFORE seeing CoT scaffolding.
#   motivated  : swap the THINK_BOTH (a) clause for the old wording
#                "which answer you can most convincingly argue for".
#   tone       : append "scholarly assertive" + cautious-quote advice
#                (control — expected small effect).
#
# Output dir: exp/strategic_isolation/<variant>/cache/
#
# Required repo secret: OPENAI_API_KEY (or PERSONAL_OPEN_AI_KEY).

on:
  workflow_dispatch:
    inputs:
      variants:
        description: "Variants to run (comma-separated). Default: all 3."
        type: choice
        required: true
        default: "precommit,motivated,tone"
        options:
          - "precommit"
          - "motivated"
          - "tone"
          - "precommit,motivated"
          - "precommit,motivated,tone"
      api_key:
        description: "Which repo secret to use as OPENAI_API_KEY"
        type: choice
        required: true
        default: "OPENAI_API_KEY"
        options:
          - OPENAI_API_KEY
          - PERSONAL_OPEN_AI_KEY

permissions:
  contents: read

env:
  OUTPUT_DIR: exp/strategic_isolation
  CACHE_KEY_PREFIX: strategic-isolation-4omini

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-obfuscation.txt

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OUTPUT_DIR }}
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-

      - name: Run experiment
        env:
          OPENAI_API_KEY: ${{ inputs.api_key == 'PERSONAL_OPEN_AI_KEY' && secrets.PERSONAL_OPEN_AI_KEY || secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m scripts.strategic_isolation_4omini \
            --variants "${{ inputs.variants }}"

      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OUTPUT_DIR }}
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategic-isolation-results
          path: |
            ${{ env.OUTPUT_DIR }}/results.json
            ${{ env.OUTPUT_DIR }}/precommit/cache/
            ${{ env.OUTPUT_DIR }}/motivated/cache/
            ${{ env.OUTPUT_DIR }}/tone/cache/
          retention-days: 30
